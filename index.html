<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Caso FLM - Visualização 3D</title>
  <style>
    body { margin: 0; overflow: hidden; background: #f2f4f7; }
    #header {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      padding: 12px 16px;
      background: rgba(255,255,255,0.95);
      font-family: Arial, sans-serif;
      font-size: 14px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.08);
      z-index: 10;
    }
    #status {
      position: absolute;
      bottom: 12px;
      left: 12px;
      right: 12px;
      font-family: Arial, sans-serif;
      font-size: 12px;
      background: rgba(255,255,255,0.9);
      padding: 8px 10px;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<div id="header">
  Planejamento Ortognático – Caso FLM<br>
  <strong>Arquivo carregado:</strong> FFM.stl
</div>

<div id="status">Carregando modelo...</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/examples/js/controls/OrbitControls.js"></script>

<script>

const STL_FILE = "FFM.stl";  // 🔵 Nome EXATO do arquivo STL

const statusEl = document.getElementById("status");

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xf2f4f7);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 5000);
camera.position.set(0, -150, 150);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
document.body.appendChild(renderer.domElement);

const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;

const light1 = new THREE.DirectionalLight(0xffffff, 1.2);
light1.position.set(1, 1, 1);
scene.add(light1);

const light2 = new THREE.DirectionalLight(0xffffff, 0.6);
light2.position.set(-1, -1, 0.5);
scene.add(light2);

scene.add(new THREE.AmbientLight(0xffffff, 0.4));

const loader = new THREE.STLLoader();
loader.load(
  STL_FILE,
  (geometry) => {

    geometry.computeBoundingBox();
    geometry.center();

    const material = new THREE.MeshPhongMaterial({
      color: 0x1565c0,
      shininess: 90
    });

    const mesh = new THREE.Mesh(geometry, material);
    scene.add(mesh);

    const box = geometry.boundingBox;
    const size = new THREE.Vector3();
    box.getSize(size);

    const maxDim = Math.max(size.x, size.y, size.z);
    const dist = maxDim * 1.8;

    camera.position.set(0, -dist, dist);
    camera.lookAt(0, 0, 0);
    controls.target.set(0, 0, 0);
    controls.update();

    statusEl.textContent = "Modelo carregado ✅ (arraste para girar, zoom para aproximar)";
  },
  (xhr) => {
    if (xhr.total) {
      const percent = Math.round((xhr.loaded / xhr.total) * 100);
      statusEl.textContent = "Carregando modelo... " + percent + "%";
    }
  },
  (error) => {
    console.error("Erro ao carregar STL:", error);
    statusEl.textContent = "Erro ao carregar FFM.stl. Verifique se o arquivo está na raiz do repositório e com o nome exato.";
  }
);

function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
